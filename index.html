<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>おんぷメーカー</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🎵 おんぷメーカー 🎵</h1>
  </header>

  <main>
    <section class="panel">
      <div class="row">
        <select id="pattern-select" aria-label="リズムパターン"></select>
        <div class="speed">
          <span>🐢</span>
          <input id="bpm-slider" type="range" min="50" max="200" value="100" aria-label="はやさ" />
          <span>🐇</span>
          <strong id="bpm-label">100</strong>
        </div>
      </div>
      <div class="huge-row">
        <button id="rhythm-toggle" class="huge-btn rhythm" aria-label="リズム スタート">▶</button>
      </div>
      <div class="beat-indicator" id="beat-indicator">
        <span></span><span></span><span></span><span></span>
      </div>
    </section>

    <section class="panel">
      <div class="huge-row">
        <button id="mic-btn" class="huge-btn mic" aria-label="おして はなす">🎤</button>
      </div>
      <div class="recognized" id="recognized-text">―</div>
      <div class="preset-buttons" id="preset-buttons"></div>
    </section>

    <section class="panel">
      <div class="staff" id="staff"></div>
      <div class="huge-row">
        <button id="play-notes-btn" class="huge-btn play" aria-label="おんぷを ならす">♪</button>
        <button id="clear-btn" class="small-btn" aria-label="クリア">✕</button>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
