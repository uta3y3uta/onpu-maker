<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>おんぷメーカー</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🎵 おんぷメーカー 🎵</h1>
    <button id="zukan-btn" class="zukan-btn" aria-label="ずかんを ひらく">📖</button>
  </header>

  <main>
    <section class="panel">
      <div class="row">
        <select id="pattern-select" aria-label="リズムパターン"></select>
        <div class="speed">
          <span>🐢</span>
          <input id="bpm-slider" type="range" min="50" max="200" value="100" aria-label="はやさ" />
          <span>🐇</span>
          <span class="tempo-mark" id="tempo-mark" aria-label="速度記号">♩=<strong id="bpm-label">100</strong></span>
        </div>
      </div>
      <div class="huge-row">
        <button id="rhythm-toggle" class="huge-btn rhythm" aria-label="リズム スタート">▶</button>
      </div>
      <div class="beat-indicator" id="beat-indicator">
        <span></span><span></span><span></span><span></span>
      </div>
    </section>

    <section class="panel">
      <div class="huge-row">
        <button id="mic-btn" class="huge-btn mic" aria-label="おして はなす">🎤</button>
      </div>
      <div class="recognized" id="recognized-text">―</div>
      <div class="preset-buttons" id="preset-buttons"></div>
    </section>

    <section class="panel">
      <div class="staff" id="staff"></div>
      <div class="huge-row">
        <button id="play-notes-btn" class="huge-btn play" aria-label="おんぷを ならす">♪</button>
        <button id="clear-btn" class="small-btn" aria-label="クリア">✕</button>
      </div>
    </section>
  </main>

  <!-- ずかん (音楽記号 図鑑) モーダル -->
  <div id="zukan" class="zukan-modal hidden" aria-hidden="true">
    <div class="zukan-box" role="dialog" aria-label="おんがくの きごう ずかん">
      <button id="zukan-close" class="zukan-close" aria-label="とじる">✕</button>
      <h2>📖 おんがくの きごう ずかん</h2>
      <p class="zukan-hint">タップすると よみあげるよ</p>
      <div id="zukan-content"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
